services:
    pizzubot:
        build: .
        image: pizzubot-prod-i
        container_name: pizzubot-prod-c
        env_file:
            - .env
        restart: unless-stopped
        depends_on:
            - postgres

    postgres:
        image: postgres:18-alpine
        container_name: pizzubot-prod-postgres-c
        env_file:
            - .env
        ports:
            - '5432:5432'
        volumes:
            - pizzubot-prod-v:/var/lib/postgresql/data
        restart: unless-stopped

volumes:
    pizzubot-prod-v:
